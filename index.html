<!DOCTYPE html>
<html>

<head>
  <base target="_top">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>LEAD STC Leave Management</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <?!= include('css'); ?>

</head>

<body>

<div class="container">

  <div class="row justify-content-center">

    <div class="col-lg-5 col-md-7 col-sm-12">

      <div class="login-card">

        <div class="text-center mb-4">

          <h2 class="fw-bold text-primary">
            LEAD STC
          </h2>

          <p class="text-muted">
            Faculty Leave Management System
          </p>

        </div>

        <div id="loginSection">

          <div class="mb-3">

            <label>Email Address</label>

            <input
              id="loginEmail"
              type="email"
              class="form-control"
              placeholder="name@gmail.com">

          </div>

          <div class="mb-4">

            <label>Mobile Number</label>

            <input
              id="loginMobile"
              type="text"
              class="form-control"
              placeholder="9876543210">

          </div>

          <div class="d-grid">

            <button
              class="btn btn-primary"
              onclick="loginTeacher()">

              Login

            </button>

          </div>

          <div class="text-center mt-3">

            <button
              class="btn btn-link"
              onclick="showRegister()">

              First Time Login?

            </button>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>

<!-- ===========================
Main Application
Hidden until login
============================ -->

<div id="appSection" class="container-fluid d-none mt-4">

    <div class="row">

        <!-- Sidebar -->

        <div class="col-lg-2">

            <div class="list-group shadow-sm">

                <button
                    class="list-group-item list-group-item-action active"
                    onclick="showModule('teacherModule')">

                    <i class="bi bi-people-fill"></i>
                    Teachers

                </button>

                <button
                    class="list-group-item list-group-item-action"
                    onclick="showModule('leaveModule')">

                    <i class="bi bi-calendar-check"></i>
                    Leave Register

                </button>

                <button
                    class="list-group-item list-group-item-action"
                    onclick="showModule('settingsModule')">

                    <i class="bi bi-gear-fill"></i>
                    Settings

                </button>

            </div>

        </div>

        <!-- Content -->

        <div class="col-lg-10">

            <!-- =======================
Teacher Module
======================= -->

            <div id="teacherModule">

                <div class="card shadow-sm">

                    <div
                        class="card-header d-flex justify-content-between align-items-center">

                        <h4 class="mb-0">

                            Teacher Management

                        </h4>

                        <button
                            class="btn btn-primary"
                            data-bs-toggle="modal"
                            data-bs-target="#teacherModal">

                            <i class="bi bi-plus-circle"></i>

                            Add Teacher

                        </button>

                    </div>

                    <div class="card-body">

                        <div class="row mb-3">

                            <div class="col-md-5">

                                <input
                                    id="teacherSearch"
                                    class="form-control"
                                    placeholder="Search Teacher..."
                                    onkeyup="searchTeachers()">

                            </div>

                        </div>

                        <div class="table-responsive">

                            <table
                                class="table table-bordered table-hover align-middle">

                                <thead class="table-light">

                                    <tr>

                                        <th>ID</th>

                                        <th>Employee ID</th>

                                        <th>Name</th>

                                        <th>Department</th>

                                        <th>Designation</th>

                                        <th>Status</th>

                                        <th width="170">

                                            Actions

                                        </th>

                                    </tr>

                                </thead>

                                <tbody id="teacherTable">

                                    <tr>

                                        <td colspan="7" class="text-center">

                                            Loading...

                                        </td>

                                    </tr>

                                </tbody>

                            </table>

                        </div>

                    </div>

                </div>

            </div>

            <!-- Future Modules -->

            <div id="leaveModule" class="d-none">

                <div class="alert alert-info">

                    Leave Register Module

                </div>

            </div>

            <div id="settingsModule" class="d-none">

                <div class="alert alert-secondary">

                    Settings Module

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Register Modal -->

<div class="modal fade"
     id="registerModal"
     tabindex="-1">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">

Teacher Registration

</h5>

<button
type="button"
class="btn-close"
data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<div class="mb-3">

<label>Full Name</label>

<input
id="name"
class="form-control">

</div>

<div class="mb-3">

<label>Email</label>

<input
id="email"
type="email"
class="form-control">

</div>

<div class="mb-3">

<label>Mobile</label>

<input
id="mobile"
class="form-control">

</div>

<div class="mb-3">

<label>Department</label>

<input
id="department"
class="form-control">

</div>

<div class="mb-3">

<label>Designation</label>

<input
id="designation"
class="form-control">

</div>

</div>

<div class="modal-footer">

<button
class="btn btn-success"
onclick="registerTeacher()">

Register

</button>

</div>

</div>

</div>

</div>

<div class="modal fade" id="teacherModal">

<div class="modal-dialog modal-lg">

<div class="modal-content">

<div class="modal-header">

<h5>Add Teacher</h5>

<button
class="btn-close"
data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<div class="row">

<div class="col-md-6 mb-3">

<label>Employee ID</label>

<input
id="empId"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Name</label>

<input
id="teacherName"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Department</label>

<input
id="teacherDepartment"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Designation</label>

<input
id="teacherDesignation"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Email</label>

<input
id="teacherEmail"
type="email"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Phone</label>

<input
id="teacherPhone"
class="form-control">

</div>

<div class="col-md-4 mb-3">

<label>CL</label>

<input
id="teacherCL"
type="number"
value="12"
class="form-control">

</div>

<div class="col-md-4 mb-3">

<label>SL</label>

<input
id="teacherSL"
type="number"
value="15"
class="form-control">

</div>

<div class="col-md-4 mb-3">

<label>EL</label>

<input
id="teacherEL"
type="number"
value="0"
class="form-control">

</div>

</div>

</div>

<div class="modal-footer">

<button
class="btn btn-success"
onclick="saveTeacher()">

Save Teacher

</button>

</div>

</div>

</div>

</div>

<?!= include('js'); ?>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
